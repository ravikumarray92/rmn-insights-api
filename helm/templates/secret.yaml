# Kubernetes Secret — holds sensitive runtime credentials.
# Values are sourced from values.secrets and should be supplied at helm install
# time via --set or a gitignored values file, never committed as plaintext.
# stringData lets you provide plain strings; Kubernetes base64-encodes them on write.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rmn-insights-api.fullname" . }}-secrets
  labels:
    {{- include "rmn-insights-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.secrets }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
